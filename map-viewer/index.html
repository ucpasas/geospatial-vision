<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Viewer · PMTiles + COG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --muted:   #8b949e;
      --text:    #e6edf3;
      --mono:    "JetBrains Mono", monospace;
    }

    html, body, #map { width: 100%; height: 100%; overflow: hidden; }

    #panel {
      position: fixed;
      top: 0; right: 0;
      width: 16rem; height: 100%;
      background: rgba(13,17,23,0.93);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      backdrop-filter: blur(8px);
      overflow-y: auto;
      z-index: 10;
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }

    .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .panel-header h1 { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
    .panel-header p { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .section-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

    .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .control-name { display: flex; align-items: center; gap: 8px; font-size: 12px; }

    .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 18px; cursor: pointer; transition: background .2s; }
    .toggle-track::after { content: ""; position: absolute; left: 2px; top: 2px; width: 14px; height: 14px; background: var(--muted); border-radius: 50%; transition: transform .2s, background .2s; }
    .toggle input:checked ~ .toggle-track { background: #1f4068; }
    .toggle input:checked ~ .toggle-track::after { transform: translateX(14px); background: var(--accent); }

    .cat-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .btn { width: 100%; padding: 7px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--surface); color: var(--text); font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }

    #attribution { padding: 12px 16px; font-family: var(--mono); font-size: 9px; color: var(--muted); line-height: 1.7; margin-top: auto; }
    #attribution a { color: var(--muted); text-decoration: none; }
    #attribution a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div id="map"></div>

  <aside id="panel">
    <div class="panel-header">
      <h1>Map Viewer</h1>
      <p>MapLibre · PMTiles · COG</p>
    </div>
    <div id="panel-body"></div>
    <div id="attribution"></div>
  </aside>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
